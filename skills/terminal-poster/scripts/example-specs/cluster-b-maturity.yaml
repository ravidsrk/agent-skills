# Cluster B — Color-Coded Levels (maturity ladder)
# Topic: generic team-process maturity model — 4 levels with semantic colors
# Render: bash make-poster.sh cluster-b-maturity.yaml output.png
#
# Field notes:
#   levels[].label    = badge string (L1, L2, ...)  -> rendered inside the badge
#   levels[].name     = the level's headline name   -> ALL CAPS in the card
#   levels[].oneliner = one-line description        -> italic under the header
#   levels[].bullets  = 3-5 bullet points
# Per-level accent palette is hard-coded in the CLI (see design-dna.md
# "Cluster B palette"), so no color field is needed here.

cluster: b

title: the engineering maturity ladder
subtitle: where is your team?
bottom_tagline: "most teams are stuck on L1 · L4 is rare · you can climb"
handle: "@yourhandle"

levels:
  - label: L1
    name: HEROIC
    oneliner: "one senior carries the team"
    bullets:
      - "knowledge in one person's head"
      - "breaks when they're on vacation"
      - "onboarding takes 3+ months"
      - "no shared standards"

  - label: L2
    name: TRIBAL
    oneliner: "small group shares context"
    bullets:
      - "team chat as documentation"
      - "patterns by oral tradition"
      - "onboarding takes 1 month"
      - "review-based knowledge transfer"

  - label: L3
    name: DOCUMENTED
    oneliner: "wiki exists. mostly stale."
    bullets:
      - "ADRs for big decisions"
      - "runbooks for known incidents"
      - "onboarding takes 1 week"
      - "20% docs always out of date"

  - label: L4
    name: AGENT-LEGIBLE
    oneliner: "code + docs are AI-navigable"
    bullets:
      - "every module has a SKILL.md"
      - "agents can answer 'how do I X?'"
      - "onboarding takes 1 day"
      - "docs regenerate from source"
