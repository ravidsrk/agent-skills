# Cluster D Mode D1 — Blueprint (step-by-step playbook)
# Topic: generic 5-step deploy playbook
# Render: bash make-poster.sh cluster-d-playbook.yaml output.png
#
# Field notes:
#   title             = pixel-bitmap headline in phosphor green
#   subtitle          = smaller green italic line under title
#   bottom_manifesto  = single lowercase manifesto next to the leading ✦
#   steps[].name      = ALL CAPS step name (e.g. AUDIT)
#   steps[].icon      = short line-art icon concept for the top of the card
#   steps[].body      = 2 lines of monospace body copy
# The numeric badge ([1], [2], ...) is auto-generated from position.

cluster: d
mode: d1

title: the five-step deploy playbook
subtitle: code to prod in five steps
bottom_manifesto: "code to prod in five steps. or you don't ship."
handle: "@yourhandle"

steps:
  - name: AUDIT
    icon: shield-with-check
    body: "scan deps for CVEs, secrets in tracked files, and lint errors. block on any critical hit."

  - name: BUILD
    icon: hammer-and-gear
    body: "compile, run unit tests, build container image. tag with git sha + semver."

  - name: STAGE
    icon: server-stack
    body: "deploy to staging. run smoke tests + load shape. promote only if green."

  - name: SHIP
    icon: rocket
    body: "rolling deploy to prod. watch error rate + latency p99 for 5 min before declaring done."

  - name: VERIFY
    icon: heartbeat-line
    body: "synthetic health check from 3 regions. open changelog entry. notify channel."
